<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Interactive Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation">☰</button>
        
        <div class="nav-container" id="navContainer">
            <div class="header-left">
                <select name="menu1" id="menu1">
                    <option value="Option 0">Option 0</option>
                    <option value="Option 1">Option 1</option>
                    <option value="Option 2">Option 2</option>
                </select>
                <select name="menu2" id="menu2">
                    <option value="Option A">Option A</option>
                    <option value="Option B">Option B</option>
                    <option value="Option C">Option C</option>
                </select>
            </div>
            
            <div class="header-right">
                <span class="header-text-display" id="headerText">Status: Active</span>
                <button type="button" id="headerBtn">Submit</button>
            </div>
        </div>
    </header>

    <main class="main-container" id="mainContainer">
        <div class="centered-card">
            
            <div class="text-wrap-field" id="textWrapField">
                Loading content...
            </div>

            <input type="text" class="card-input" id="cardInput" placeholder="Enter text here...">

            <div class="button-row">
                <button type="button" id="saveBtn">Save</button>
                <button type="button" class="secondary" id="cancelBtn">Cancel</button>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
